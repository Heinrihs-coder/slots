<!DOCTYPE html>
<html>
<head>
    <title>Friend Slots</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }
        .slot {
            font-size: 60px;
            margin: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🎰 Friend Slot Machine 🎰</h1>

<div class="slot" id="reels">❓ ❓ ❓</div>

<button onclick="spin()">SPIN</button>

<h2 id="result"></h2>

<script>
    const symbols = ["🍒","🍋","⭐","💎","🔔"];

    function spin() {
        let r1 = symbols[Math.floor(Math.random() * symbols.length)];
        let r2 = symbols[Math.floor(Math.random() * symbols.length)];
        let r3 = symbols[Math.floor(Math.random() * symbols.length)];

        document.getElementById("reels").innerHTML = r1 + " " + r2 + " " + r3;

        if (r1 === r2 && r2 === r3) {
            document.getElementById("result").innerText = "🎉 JACKPOT!";
        } else {
            document.getElementById("result").innerText = "Try again!";
        }
    }
</script>

</body>
</html>
