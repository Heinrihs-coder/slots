<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💊 Kama mašīna 💊</title>
<style>
    body {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #2e2c2c, #0f0f0f);
        color: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
    }

    h1 {
        margin-top: 30px;
        font-size: 3em;
        color: #00ffcc;
        text-shadow: 2px 2px 5px #000;
    }

    #coins {
        font-size: 1.5em;
        margin: 15px;
        background: rgba(255,255,255,0.1);
        padding: 10px 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px #00ffcc;
    }

    .slot {
        font-size: 70px;
        margin: 20px;
        height: 100px;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 20px;
        background: rgba(0,0,0,0.3);
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffcc inset;
    }

    .symbol {
        display: inline-block;
        opacity: 0;
        transform: translateY(-100px);
        transition: all 0.5s ease;
    }
    .symbol.show {
        opacity: 1;
        transform: translateY(0);
    }

    button {
        padding: 15px 40px;
        font-size: 20px;
        cursor: pointer;
        margin: 10px;
        border: none;
        border-radius: 15px;
        background: linear-gradient(45deg, #00ffcc, #0066ff);
        color: #fff;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    #result {
        margin: 15px;
        font-size: 1.3em;
        min-height: 30px;
        color: #ffcc00;
        text-shadow: 1px 1px 3px #000;
    }

    #win-message {
        position: fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.95);
        color: #00ffcc;
        font-size: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        display: none;
        text-shadow: 2px 2px 10px #000;
    }
</style>
</head>
<body>

<h1>💊 Kama mašīna 💊</h1>

<div id="coins">Coins: 1000</div>

<div class="slot" id="reels">
    <span class="symbol">❓</span>
    <span class="symbol">❓</span>
    <span class="symbol">❓</span>
</div>

<div>
    <button onclick="spin()">SPIN</button>
    <button onclick="flashScreen()">FLASH SCREEN</button>
    <button onclick="restart()">Restart</button>
</div>

<div id="result"></div>
<div id="win-message">KAMS ATNACA!</div>

<script>
const symbols = ["💊","🧪","⚗️","🧬","🩺"];
let coins = 1000;

function spin() {
    if (coins <= 0) {
        document.getElementById("result").innerText = "You have no coins! Press Restart.";
        return;
    }

    const reelSpans = document.querySelectorAll("#reels .symbol");

    // Pick random symbols
    const results = [
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)]
    ];

    // Animate all symbols
    reelSpans.forEach((span, index) => {
        span.classList.remove("show"); // reset animation
        span.textContent = "❓"; // placeholder
        setTimeout(() => {
            span.textContent = results[index];
            span.classList.add("show");
        }, index * 300); // stagger animation
    });

    // Update coins after animation
    setTimeout(() => {
        const [r1,r2,r3] = results;
        if (r1 === r2 && r2 === r3) {
            coins += 5000;
            document.getElementById("result").innerText = "Kams +5000 coins!";
        } else if (r1 === r2 || r2 === r3 || r1 === r3) {
            coins += 400;
            document.getElementById("result").innerText = "Bik apkamojies +400 coins!";
        } else {
            coins -= 50;
            document.getElementById("result").innerText = "Papisi -50 coins";
        }
        document.getElementById("coins").innerText = "Coins: " + coins;

        if (coins >= 10000) {
            document.getElementById("win-message").style.display = "flex";
        }
    }, 1000);
}

function restart() {
    coins = 1000;
    document.getElementById("coins").innerText = "Coins: " + coins;
    const reelSpans = document.querySelectorAll("#reels .symbol");
    reelSpans.forEach(span => {
        span.textContent = "❓";
        span.classList.remove("show");
    });
    document.getElementById("result").innerText = "";
    document.getElementById("win-message").style.display = "none";
}

function flashScreen() {
    const flash = document.createElement("div");
    flash.style.position = "fixed";
    flash.style.top = "0";
    flash.style.left = "0";
    flash.style.width = "100%";
    flash.style.height = "100%";
    flash.style.backgroundColor = "white";
    flash.style.zIndex = "1000";
    flash.style.opacity = "0.9";
    document.body.appendChild(flash);
    setTimeout(() => { document.body.removeChild(flash); }, 200);
}
</script>

</body>
</html>
